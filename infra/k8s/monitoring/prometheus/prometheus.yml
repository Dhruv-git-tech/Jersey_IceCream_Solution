# =============================================================================
# Jersey Ice Cream Platform — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ─── FastAPI Backend ─────────────────────────────────────────────────
  - job_name: "jersey-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "backend"
          environment: "development"

  # ─── Node Exporter (Host Metrics) ────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── Redis Exporter ─────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ─── PostgreSQL Exporter ────────────────────────────────────────────
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ─── Kafka Exporter ────────────────────────────────────────────────
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # ─── Prometheus Self-Monitoring ─────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

# ─── Alerting Rules ────────────────────────────────────────────────────
rule_files:
  - "alerts/*.yml"
